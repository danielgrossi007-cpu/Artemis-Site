<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis - Tech Trivia</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');
        
        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background: #050810; 
            color: white;
            font-family: 'Outfit', sans-serif; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%; max-width: 700px;
            background: #111526;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .back-link {
            position: absolute; top: 20px; left: 20px;
            color: #aaa; text-decoration: none; font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-link:hover { color: white; }

        h1 { margin-bottom: 30px; font-size: 2.5rem; color: #00f2ff; text-transform: uppercase; letter-spacing: 2px; }

        /* MENU STYLES */
        .menu-btn {
            display: block; width: 100%; padding: 20px; margin: 15px 0;
            border: none; border-radius: 15px;
            font-size: 1.2rem; font-weight: 900;
            cursor: pointer; transition: all 0.2s;
            text-transform: uppercase;
            color: #050810;
        }
        .btn-easy { background: #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .btn-med { background: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.2); }
        .btn-hard { background: #ff0055; color: white; box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); }
        
        .menu-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* GAME STYLES */
        #game-interface { display: none; }
        
        .progress-bar {
            width: 100%; height: 8px; background: #222;
            border-radius: 4px; margin-bottom: 30px; overflow: hidden;
        }
        .progress-fill { height: 100%; background: #00f2ff; width: 0%; transition: width 0.3s; }

        .question-box {
            font-size: 1.4rem; font-weight: 500;
            min-height: 120px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px; line-height: 1.4;
        }

        .answers { display: flex; gap: 20px; }
        .ans-btn {
            flex: 1; padding: 20px; border: none; border-radius: 12px;
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            transition: transform 0.1s;
        }
        .true-btn { background: #00ff88; color: #050810; }
        .false-btn { background: #ff0055; color: white; }
        
        .ans-btn:active { transform: scale(0.95); }
        .ans-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .feedback { 
            height: 30px; margin-top: 20px; 
            font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;
        }

        /* END SCREEN */
        #end-screen { display: none; }
        .final-score { font-size: 4rem; color: #00f2ff; margin: 20px 0; font-weight: 900; }
        .restart-btn {
            background: transparent; border: 2px solid #00f2ff; color: #00f2ff;
            padding: 15px 40px; border-radius: 30px; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .restart-btn:hover { background: #00f2ff; color: #000; }

    </style>
</head>
<body>

    <div class="container">
        <a href="giochi.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> ESCI</a>

        <div id="menu">
            <h1>Tech Trivia</h1>
            <p style="margin-bottom:30px; opacity:0.7;">Seleziona la difficoltà. Rispondi a 15 domande casuali.</p>
            <button class="menu-btn btn-easy" onclick="startGame('easy')">BASE</button>
            <button class="menu-btn btn-med" onclick="startGame('medium')">INTERMEDIO</button>
            <button class="menu-btn btn-hard" onclick="startGame('hard')">DIFFICILE</button>
        </div>

        <div id="game-interface">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; opacity:0.7; font-size:0.9rem;">
                <span id="level-indicator">Livello: -</span>
                <span id="q-count">1/15</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            
            <div class="question-box" id="question-text">Caricamento...</div>
            
            <div class="answers">
                <button class="ans-btn true-btn" id="btn-true" onclick="answer(true)">VERO</button>
                <button class="ans-btn false-btn" id="btn-false" onclick="answer(false)">FALSO</button>
            </div>
            <div class="feedback" id="feedback-msg"></div>
        </div>

        <div id="end-screen">
            <h1>RISULTATO</h1>
            <p>Hai totalizzato:</p>
            <div class="final-score" id="final-score">0/15</div>
            <p id="final-msg" style="opacity:0.8; margin-bottom:20px;"></p>
            <button class="restart-btn" onclick="location.reload()">TORNA AL MENU</button>
        </div>
    </div>

    <script>
        /* DATABASE DOMANDE 
           Per aggiungerne altre, segui il formato: {q: "Testo", a: true/false}, 
        */
        const db = {
            easy: [
                {q: "La CPU è il componente che esegue i calcoli.", a: true},
                {q: "RAM sta per Read Access Memory.", a: false}, // Random Access Memory
                {q: "Il mouse è una periferica di output.", a: false}, // Input
                {q: "Windows è un sistema operativo.", a: true},
                {q: "1 Byte è composto da 8 Bit.", a: true},
                {q: "Google Chrome è un motore di ricerca.", a: false}, // Browser
                {q: "L'Hard Disk è più veloce di un SSD.", a: false},
                {q: "Il Wi-Fi permette connessioni senza fili.", a: true},
                {q: "USB sta per Universal Serial Bus.", a: true},
                {q: "L'estensione .jpg indica un file audio.", a: false},
                {q: "La tastiera serve per inserire testo.", a: true},
                {q: "Il monitor serve per stampare fogli.", a: false},
                {q: "Android è sviluppato da Apple.", a: false},
                {q: "La password '123456' è sicura.", a: false},
                {q: "Il tasto 'Caps Lock' attiva il maiuscolo.", a: true},
                {q: "Ctrl+C serve per incollare.", a: false}, // Copiare
                {q: "L'indirizzo email contiene sempre una @.", a: true},
                {q: "Facebook è un Social Network.", a: true},
                {q: "Il termine 'Bug' indica un errore software.", a: true},
                {q: "L'HTML è un linguaggio di programmazione.", a: false}, // Markup
                {q: "Il processore i7 è prodotto da Intel.", a: true},
                {q: "La GPU gestisce la grafica.", a: true},
                {q: "Linux è un sistema operativo Open Source.", a: true},
                {q: "Il tasto ESC serve per uscire.", a: true},
                {q: "Un Laptop è un computer fisso.", a: false},
                {q: "Lo Smartphone è un computer tascabile.", a: true},
                {q: "Il Bluetooth ha una portata di chilometri.", a: false},
                {q: "Il file .exe è un eseguibile Windows.", a: true},
                {q: "Il browser serve per navigare in internet.", a: true},
                {q: "Il tasto F5 aggiorna la pagina.", a: true},
                {q: "Word serve per scrivere documenti.", a: true},
                {q: "Excel serve per fare presentazioni.", a: false},
                {q: "La webcam cattura video.", a: true},
                {q: "Gli speaker sono periferiche di input.", a: false},
                {q: "Un Terabyte è più grande di un Gigabyte.", a: true},
                {q: "Il 5G è una tecnologia per reti mobili.", a: true},
                {q: "Il backup serve a cancellare i dati.", a: false},
                {q: "Il tasto Shift serve per fare la chiocciola.", a: false},
                {q: "Wikipedia è un'enciclopedia online.", a: true},
                {q: "Il Phishing è una tecnica di hacking.", a: true},
                {q: "Il firewall protegge dagli incendi.", a: false},
                {q: "Java e JavaScript sono la stessa cosa.", a: false},
                {q: "Il modem serve per connettersi a internet.", a: true},
                {q: "I cookie sono biscotti digitali.", a: false},
                {q: "Lo spam è posta indesiderata.", a: true},
                {q: "Il cestino di Windows elimina i file per sempre subito.", a: false},
                {q: "Alt+F4 chiude la finestra attiva.", a: true},
                {q: "Il microfono è una periferica di input.", a: true},
                {q: "La scheda madre connette tutti i componenti.", a: true},
                {q: "Il sistema binario usa le cifre 0, 1 e 2.", a: false}
            ],
            medium: [
                {q: "L'indirizzo IP identifica un dispositivo in rete.", a: true},
                {q: "HTTP è un protocollo sicuro e criptato.", a: false}, // HTTPS lo è
                {q: "DNS traduce nomi di dominio in IP.", a: true},
                {q: "Python richiede la compilazione del codice.", a: false}, // Interpretato
                {q: "SSD non ha parti meccaniche in movimento.", a: true},
                {q: "Lo Switch lavora al livello 2 (Data Link).", a: true},
                {q: "Il protocollo TCP garantisce la consegna dei dati.", a: true},
                {q: "UDP è più lento del TCP.", a: false}, // Più veloce
                {q: "La fibra ottica trasmette segnali elettrici.", a: false}, // Luce
                {q: "Un indirizzo IPv4 è composto da 32 bit.", a: true},
                {q: "SQL è usato per gestire database.", a: true},
                {q: "LAN sta per Large Area Network.", a: false}, // Local
                {q: "Il MAC Address è un indirizzo logico.", a: false}, // Fisico
                {q: "Il BIOS si avvia prima del sistema operativo.", a: true},
                {q: "La cache è una memoria molto lenta.", a: false},
                {q: "VPN sta per Virtual Private Network.", a: true},
                {q: "Il ping misura la latenza.", a: true},
                {q: "Un algoritmo è una sequenza finita di passi.", a: true},
                {q: "Il multitasking esegue processi realmente simultanei su single-core.", a: false},
                {q: "La crittografia serve a nascondere i dati.", a: true},
                {q: "Un array è una lista di elementi.", a: true},
                {q: "Il loop 'while' esegue finché la condizione è vera.", a: true},
                {q: "C++ è un linguaggio orientato agli oggetti.", a: true},
                {q: "SATA è un'interfaccia per schede video.", a: false}, // Hard Disk
                {q: "DDR4 è un tipo di memoria RAM.", a: true},
                {q: "Overclocking riduce la velocità della CPU.", a: false},
                {q: "HDMI trasporta sia audio che video.", a: true},
                {q: "Il Kernel è il cuore del sistema operativo.", a: true},
                {q: "Open Office è un software a pagamento.", a: false},
                {q: "Il formato PNG supporta la trasparenza.", a: true},
                {q: "Il formato MP4 è solo per l'audio.", a: false},
                {q: "Il DHCP assegna indirizzi IP statici.", a: false}, // Dinamici
                {q: "La porta 80 è usata da HTTP.", a: true},
                {q: "Un attacco DDoS mira a rendere un servizio irraggiungibile.", a: true},
                {q: "Il termine 'Cloud' indica server remoti.", a: true},
                {q: "La virtualizzazione permette di eseguire più OS insieme.", a: true},
                {q: "Raspberry Pi è un computer costoso.", a: false},
                {q: "Arduino è un microcontrollore.", a: true},
                {q: "Git è un sistema di versionamento.", a: true},
                {q: "GitHub e Git sono la stessa cosa.", a: false},
                {q: "La GUI è l'interfaccia grafica.", a: true},
                {q: "Il terminale usa un'interfaccia a riga di comando.", a: true},
                {q: "Un Terabyte equivale a 1000 Megabyte.", a: false}, // 1000 GB (circa)
                {q: "Lo spyware raccoglie informazioni senza consenso.", a: true},
                {q: "Il Trojan si replica come un virus.", a: false},
                {q: "Il protocollo SMTP serve per ricevere email.", a: false}, // Inviare
                {q: "IMAP sincronizza le email su più dispositivi.", a: true},
                {q: "I cookie di terze parti tracciano l'utente.", a: true},
                {q: "Il RAID 0 fa il backup dei dati.", a: false}, // Performance
                {q: "La latenza si misura in millisecondi.", a: true}
            ],
            hard: [
                {q: "Il modello OSI ha 7 livelli.", a: true},
                {q: "IPv6 utilizza indirizzi a 128 bit.", a: true},
                {q: "In C, un puntatore memorizza un valore intero.", a: false}, // Indirizzo
                {q: "Il livello 4 del modello OSI è il Trasporto.", a: true},
                {q: "ARP risolve indirizzi IP in indirizzi MAC.", a: true},
                {q: "Il deadlock avviene quando due processi si bloccano a vicenda.", a: true},
                {q: "La crittografia asimmetrica usa una sola chiave.", a: false}, // Due
                {q: "NAT permette a più dispositivi di usare un solo IP pubblico.", a: true},
                {q: "Lo scheduler decide quale processo mandare in CPU.", a: true},
                {q: "VLAN sta per Virtual Local Area Network.", a: true},
                {q: "La porta 443 è standard per HTTP.", a: false}, // HTTPS
                {q: "In un DB Relazionale, le righe sono chiamate Tuple.", a: true},
                {q: "La complessità O(n) è più veloce di O(1).", a: false},
                {q: "Il protocollo ICMP è usato per il Ping.", a: true},
                {q: "UDP ha un meccanismo di controllo di flusso.", a: false},
                {q: "Il handshake TCP è a 3 vie (SYN, SYN-ACK, ACK).", a: true},
                {q: "I thread condividono lo spazio di memoria del processo.", a: true},
                {q: "Il file system NTFS è tipico di Linux.", a: false},
                {q: "RAID 1 effettua il mirroring dei dischi.", a: true},
                {q: "Il buffer overflow è una vulnerabilità di sicurezza.", a: true},
                {q: "La maschera /24 corrisponde a 255.255.0.0.", a: false}, // 255.255.255.0
                {q: "Il protocollo BGP gestisce il routing tra sistemi autonomi.", a: true},
                {q: "In Python, le liste sono immutabili.", a: false}, // Tuple
                {q: "JSON sta per JavaScript Object Notation.", a: true},
                {q: "REST è un'architettura software per servizi web.", a: true},
                {q: "Docker utilizza la virtualizzazione hardware completa.", a: false}, // Container
                {q: "SQL Injection colpisce i database.", a: true},
                {q: "XSS sta per Cross-Site Scripting.", a: true},
                {q: "Il Kernel Linux è monolitico.", a: true},
                {q: "Un indirizzo MAC è lungo 48 bit.", a: true},
                {q: "Il protocollo FTP trasmette le password in chiaro.", a: true},
                {q: "SSH lavora tipicamente sulla porta 22.", a: true},
                {q: "La frammentazione IP avviene al livello Trasporto.", a: false}, // Network
                {q: "Un socket è definito da IP e Porta.", a: true},
                {q: "La RAM è una memoria non volatile.", a: false},
                {q: "La NVRAM mantiene i dati senza alimentazione.", a: true},
                {q: "Il registro EIP/RIP punta alla prossima istruzione.", a: true},
                {q: "Lo stack cresce verso indirizzi di memoria alti.", a: false}, // Bassi (solitamente)
                {q: "L'heap è usato per l'allocazione dinamica.", a: true},
                {q: "Il protocollo STP evita loop nella rete.", a: true},
                {q: "Una VPN Site-to-Site collega singoli PC.", a: false},
                {q: "Il protocollo TLS ha sostituito SSL.", a: true},
                {q: "Hashing e Cifratura sono la stessa cosa.", a: false},
                {q: "MD5 è considerato un algoritmo di hash sicuro oggi.", a: false},
                {q: "Un attacco Man-in-the-Middle intercetta comunicazioni.", a: true},
                {q: "Il comando 'chmod 777' dà permessi totali.", a: true},
                {q: "Il comando 'grep' serve per cercare file.", a: false}, // Stringhe nel testo
                {q: "Root è l'utente amministratore in Unix.", a: true},
                {q: "Active Directory è un servizio di directory Microsoft.", a: true},
                {q: "La latenza di un satellite geostazionario è bassa.", a: false}
            ]
        };

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let gameRunning = false;

        // ELEMENTI DOM
        const menuEl = document.getElementById('menu');
        const gameEl = document.getElementById('game-interface');
        const endEl = document.getElementById('end-screen');
        const qText = document.getElementById('question-text');
        const qCount = document.getElementById('q-count');
        const feedback = document.getElementById('feedback-msg');
        const progressBar = document.getElementById('progress');
        const btnTrue = document.getElementById('btn-true');
        const btnFalse = document.getElementById('btn-false');
        const levelInd = document.getElementById('level-indicator');

        function startGame(level) {
            // 1. Prendi tutte le domande del livello
            const allQuestions = db[level];
            
            // 2. Mescolale a caso (Algoritmo semplice di sort casuale)
            // 3. Prendine solo le prime 15
            currentQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 15);
            
            // Setup Iniziale
            currentIndex = 0;
            score = 0;
            gameRunning = true;
            
            // UI Update
            levelInd.innerText = "Livello: " + (level === 'easy' ? "BASE" : level === 'medium' ? "INTERMEDIO" : "DIFFICILE");
            menuEl.style.display = 'none';
            endEl.style.display = 'none';
            gameEl.style.display = 'block';
            
            loadQuestion();
        }

        function loadQuestion() {
            if (currentIndex >= currentQuestions.length) {
                endGame();
                return;
            }

            const q = currentQuestions[currentIndex];
            qText.innerText = q.q;
            qCount.innerText = `${currentIndex + 1}/${currentQuestions.length}`;
            
            // Reset UI
            feedback.innerText = "";
            btnTrue.disabled = false;
            btnFalse.disabled = false;
            btnTrue.style.opacity = "1";
            btnFalse.style.opacity = "1";
            
            // Barra progresso
            const pct = (currentIndex / currentQuestions.length) * 100;
            progressBar.style.width = pct + "%";
        }

        function answer(userVal) {
            if (!gameRunning) return;

            const q = currentQuestions[currentIndex];
            const isCorrect = (userVal === q.a);

            if (isCorrect) {
                score++;
                feedback.innerText = "CORRETTO!";
                feedback.style.color = "#00ff88";
            } else {
                feedback.innerText = "SBAGLIATO!";
                feedback.style.color = "#ff0055";
            }

            // Disabilita pulsanti
            btnTrue.disabled = true;
            btnFalse.disabled = true;

            // Evidenzia visivamente
            if(userVal === true) { btnFalse.style.opacity = "0.3"; }
            else { btnTrue.style.opacity = "0.3"; }

            currentIndex++;
            
            // Aspetta un secondo e passa alla prossima
            setTimeout(() => {
                loadQuestion();
            }, 800);
        }

        function endGame() {
            gameRunning = false;
            gameEl.style.display = 'none';
            endEl.style.display = 'block';
            
            const scoreEl = document.getElementById('final-score');
            const msgEl = document.getElementById('final-msg');
            
            scoreEl.innerText = `${score}/15`;
            
            if(score === 15) msgEl.innerText = "PERFETTO! SEI UN DIO DEL TECH!";
            else if(score >= 12) msgEl.innerText = "Ottimo lavoro! Ci sai fare.";
            else if(score >= 8) msgEl.innerText = "Non male, ma puoi migliorare.";
            else msgEl.innerText = "Hai bisogno di ripassare un po'...";
        }

    </script>
</body>
</html>
