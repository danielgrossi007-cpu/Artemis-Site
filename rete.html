<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis - Rete 2D Dettagliata</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #000000, #1a1a2e, #16213e, #0f3460);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #e0e0e0;
            --accent-color: #00f2ff;
        }

        body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background: var(--bg-gradient); background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Outfit', sans-serif; color: var(--text-color);
            overflow-x: hidden; opacity: 1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        
        #flicker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.05s ease-in-out;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 40px; flex-wrap: wrap; }
        .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(to right, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        nav ul { list-style: none; display: flex; flex-wrap: wrap; gap: 10px; padding: 0; margin: 0; }
        .nav-item { padding: 8px 15px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; color: white; text-decoration: none; transition: all 0.3s ease; backdrop-filter: blur(5px); font-size: 0.9rem; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2); }
        
        #network-2d-container {
            position: relative;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; backdrop-filter: blur(10px); margin-bottom: 20px;
        }
        #network-2d-canvas { width: 100%; height: 800px; border-radius: 15px; background: #0a0e1a; cursor: grab; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .control-btn { padding: 10px 15px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 25px; color: white; cursor: pointer; transition: all 0.3s ease; }
        .control-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-color); }
        .control-btn.active { background: var(--accent-color); color: #000; }

        #network-legend {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 15px;
            margin-bottom: 20px;
            background: var(--glass-bg);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-item img { width: 32px; height: 32px; }
        .legend-item span { font-size: 0.9rem; }
        
        footer { text-align: center; padding: 20px; opacity: 0.6; font-size: 0.9rem;}
    </style>
</head>

<body class="loaded">

    <div id="flicker-overlay"></div>

    <div class="container">
        <header>
            <a href="index.html" class="logo">ARTEMIS</a>
            <nav>
                 <ul>
                    <li><a href="index.html" class="nav-item">Home</a></li>
                    <li><a href="prodotto.html" class="nav-item">Prodotto</a></li>
                    <li><a href="guida.html" class="nav-item">Guida</a></li>
                    <li><a href="tempio.html" class="nav-item">Tempio</a></li>
                    <li><a href="azienda.html" class="nav-item">Azienda</a></li>
                    <li><a href="breakeven.html" class="nav-item">BEP</a></li>
                    <li><a href="curriculum.html" class="nav-item">Curriculum</a></li>
                    <li><a href="rete.html" class="nav-item">Rete</a></li>
                    <li><a href="giochi.html" class="nav-item">Giochi</a></li>
                    <li><a href="https://artemis-ocuz.onrender.com/" class="nav-item">Download</a></li>
                </ul>
            </nav>
        </header>

        <div id="network-2d-container">
            <div class="controls">
                <button id="toggle-conn-btn" class="control-btn active">Mostra Connessioni</button>
                <button id="reset-view-btn" class="control-btn">Reset Vista</button>
            </div>
            <canvas id="network-2d-canvas"></canvas>
        </div>

        <div id="network-legend"></div>
        
        <footer>
            <p>Rete Aziendale Tier IV: Ridondanza 2N, Uptime 99.995%, Cablaggio Cat6A + Wi-Fi 6E. © 2025 Artemis Inc.</p>
        </footer>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('network-2d-canvas');
        const ctx = canvas.getContext('2d');
        let devices = [], connections = [];
        let showConnections = true;
        let icons = {};
        const iconTypes = [
            { id: 'router', name: 'Router' }, 
            { id: 'switch', name: 'Switch' }, 
            { id: 'server', name: 'Server' }, 
            { id: 'firewall', name: 'Firewall' }, 
            { id: 'pc', name: 'PC / Reparto' }
        ];

        const svg_icons = {
            router: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="#2C3E50" stroke="#ECF0F1" stroke-width="2"/><path d="M 20 20 L 44 44 M 20 44 L 44 20" stroke="#3498DB" stroke-width="4" stroke-linecap="round"/><path d="M 32 12 V 4 M 32 60 V 52 M 12 32 H 4 M 60 32 H 52" stroke="#ECF0F1" stroke-width="3" stroke-linecap="round"/></svg>`,
            switch: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="16" width="56" height="32" rx="4" fill="#2C3E50" stroke="#ECF0F1" stroke-width="2"/><path d="M 12 32 H 24 M 18 26 L 12 32 L 18 38" stroke="#2ECC71" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" /><path d="M 52 32 H 40 M 46 26 L 52 32 L 46 38" stroke="#2ECC71" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" /></svg>`,
            server: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="10" y="8" width="44" height="48" rx="3" fill="#34495E" stroke="#ECF0F1" stroke-width="2"/><line x1="18" y1="18" x2="46" y2="18" stroke="#7F8C8D" stroke-width="2" /><rect x="20" y="24" width="8" height="4" fill="#2ECC71" /><line x1="18" y1="34" x2="46" y2="34" stroke="#7F8C8D" stroke-width="2" /><line x1="18" y1="40" x2="46" y2="40" stroke="#7F8C8D" stroke-width="2" /></svg>`,
            firewall: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M 8 56 V 20 L 32 8 L 56 20 V 56 Z" fill="#E74C3C" stroke="#C0392B" stroke-width="3"/><path d="M 8 30 H 56 M 32 8 V 56" stroke="#C0392B" stroke-width="3" /></svg>`,
            pc: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="12" width="48" height="32" rx="2" fill="#3498DB" stroke="#2980B9" stroke-width="2" /><path d="M 20 56 L 44 56 L 48 44 H 16 Z" fill="#2C3E50"/></svg>`
        };

        let pan_offset = { x: 0, y: 0 }, scale = 1.0;
        let is_panning = false, is_dragging = false;
        let pan_start = { x: 0, y: 0 }, drag_start = { x: 0, y: 0 };
        const drag_threshold = 5;
        let iconsLoaded = 0;

        function loadIcons() {
            iconTypes.forEach(type => {
                const img = new Image();
                img.src = "data:image/svg+xml;base64," + btoa(svg_icons[type.id]);
                img.onload = () => {
                    icons[type.id] = img;
                    if (++iconsLoaded === iconTypes.length) {
                        main();
                        populateLegend();
                    }
                };
            });
        }
        
        function populateLegend() {
            const legendContainer = document.getElementById('network-legend');
            legendContainer.innerHTML = '';
            iconTypes.forEach(type => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                const img = document.createElement('img');
                img.src = icons[type.id].src;
                const span = document.createElement('span');
                span.textContent = type.name;
                item.appendChild(img);
                item.appendChild(span);
                legendContainer.appendChild(item);
            });
        }

        function createNetworkLayout() {
            const w = canvas.width, h = canvas.height;
            const departments = [
                { id: 'dev', name: 'Sviluppo', count: 60, x: w * 0.15, y: h * 0.45 },
                { id: 'rs', name: 'R&S', count: 10, x: w * 0.15, y: h * 0.65 },
                { id: 'ui', name: 'UI/UX', count: 8, x: w * 0.3, y: h * 0.45 },
                { id: 'maint', name: 'Manutenzione', count: 15, x: w * 0.3, y: h * 0.65 },
                
                { id: 'mkt', name: 'Marketing', count: 12, x: w * 0.15, y: h * 0.85 },
                { id: 'supp', name: 'Supporto', count: 15, x: w * 0.3, y: h * 0.85 },
                { id: 'admin', name: 'Amministrazione', count: 10, x: w * 0.45, y: h * 0.85 },
                { id: 'log', name: 'Logistica', count: 10, x: w * 0.6, y: h * 0.85 },
            ];
            
            devices = [
                // Core Layer
                { id: 'core_r1', type: 'router', name: 'Core Router 1', x: w*0.4, y: h*0.08 },
                { id: 'core_r2', type: 'router', name: 'Core Router 2', x: w*0.6, y: h*0.08 },
                { id: 'core_sw1', type: 'switch', name: 'Core Switch 1', x: w*0.4, y: h*0.2 },
                { id: 'core_sw2', type: 'switch', name: 'Core Switch 2', x: w*0.6, y: h*0.2 },

                // Firewall Layer
                { id: 'fw1', type: 'firewall', name: 'Firewall 1', x: w*0.4, y: h*0.32 },
                { id: 'fw2', type: 'firewall', name: 'Firewall 2', x: w*0.6, y: h*0.32 },

                // Distribution
                { id: 'dist_tech', type: 'switch', name: 'Dist. Tech', x: w*0.225, y: h*0.32 },
                { id: 'dist_biz', type: 'switch', name: 'Dist. Business', x: w*0.375, y: h*0.72 },
                { id: 'dc_sw', type: 'switch', name: 'Dist. Data Center', x: w*0.8, y: h*0.32 },

                // Data Center
                ...[
                    { id: 'dc_serv', type: 'server', name: 'Web Server', x: w*0.8, y: h*0.45 },
                    { id: 'dc_ia', type: 'server', name: 'IA Engine', x: w*0.8, y: h*0.58 },
                    { id: 'dc_db', type: 'server', name: 'Database', x: w*0.8, y: h*0.71 },
                    { id: 'dc_backup', type: 'server', name: 'Backup', x: w*0.9, y: h*0.5 },
                    { id: 'dc_storage', type: 'server', name: 'Storage SAN', x: w*0.9, y: h*0.63 },
                ]
            ];

            departments.forEach(dept => {
                devices.push({ id: `pc_${dept.id}`, type: 'pc', name: dept.name, details: `${dept.count} Dip.`, x: dept.x, y: dept.y });
            });

            connections = [
                { from: 'core_r1', to: 'core_sw1' }, { from: 'core_r2', to: 'core_sw2' },
                { from: 'core_sw1', to: 'fw1' }, { from: 'core_sw2', to: 'fw2' },
                { from: 'fw1', to: 'dist_tech' }, { from: 'fw2', to: 'dist_tech' },
                { from: 'fw1', to: 'dist_biz' }, { from: 'fw2', to: 'dist_biz' },
                { from: 'fw1', to: 'dc_sw' }, { from: 'fw2', to: 'dc_sw' },
                { from: 'dist_tech', to: 'pc_dev' }, { from: 'dist_tech', to: 'pc_rs' }, { from: 'dist_tech', to: 'pc_ui' }, { from: 'dist_tech', to: 'pc_maint' },
                { from: 'dist_biz', to: 'pc_mkt' }, { from: 'dist_biz', to: 'pc_supp' }, { from: 'dist_biz', to: 'pc_admin' }, { from: 'dist_biz', to: 'pc_log' },
                { from: 'dc_sw', to: 'dc_serv' }, { from: 'dc_sw', to: 'dc_ia' }, { from: 'dc_sw', to: 'dc_db' }, { from: 'dc_sw', to: 'dc_backup' }, { from: 'dc_sw', to: 'dc_storage' },
            ];
        }
        
        function draw() {
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(pan_offset.x, pan_offset.y);
            ctx.scale(scale, scale);

            if (showConnections) {
                ctx.strokeStyle = 'rgba(74, 144, 226, 0.4)';
                ctx.lineWidth = 1.5 / scale;
                connections.forEach(conn => {
                    const from = devices.find(d => d.id === conn.from), to = devices.find(d => d.id === conn.to);
                    if (from && to) {
                        ctx.beginPath();
                        ctx.moveTo(from.x, from.y);
                        ctx.lineTo(to.x, to.y);
                        ctx.stroke();
                    }
                });
            }

            devices.forEach(device => {
                const icon = icons[device.type];
                const w = 50, h = 50;
                if (icon) ctx.drawImage(icon, device.x - w/2, device.y - h/2, w, h);

                ctx.fillStyle = 'white';
                ctx.font = `${11 / scale}px Outfit`;
                ctx.textAlign = 'center';
                ctx.fillText(device.name, device.x, device.y + h/2 + (12 / scale));
                if(device.details) {
                    ctx.font = `${9 / scale}px Outfit`;
                    ctx.fillStyle = '#bbb';
                    ctx.fillText(device.details, device.x, device.y + h/2 + (24 / scale));
                }
            });
            
            ctx.restore();
        }

        function handleResize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            createNetworkLayout();
            draw();
        }

        function main() {
            handleResize();
            window.addEventListener('resize', handleResize);

            // --- Panning and Drag Threshold Logic ---
            canvas.addEventListener('mousedown', e => {
                is_panning = true;
                drag_start = { x: e.clientX, y: e.clientY };
                pan_start = { x: pan_offset.x, y: pan_offset.y };
            });

            canvas.addEventListener('mouseup', () => {
                is_panning = false;
                is_dragging = false;
                canvas.style.cursor = 'grab';
            });
            
            canvas.addEventListener('mouseleave', () => {
                is_panning = false;
                is_dragging = false;
                canvas.style.cursor = 'grab';
            });

            canvas.addEventListener('mousemove', e => {
                if (!is_panning) return;

                const dx = e.clientX - drag_start.x;
                const dy = e.clientY - drag_start.y;

                if (is_dragging || Math.abs(dx) > drag_threshold || Math.abs(dy) > drag_threshold) {
                    is_dragging = true;
                    canvas.style.cursor = 'grabbing';
                    pan_offset.x = pan_start.x + dx;
                    pan_offset.y = pan_start.y + dy;
                    draw();
                }
            });

            canvas.addEventListener('wheel', e => {
                e.preventDefault();
                const zoom = Math.exp((e.deltaY < 0 ? 1 : -1) * 0.1);
                scale = Math.max(0.4, Math.min(2.0, scale * zoom));
                draw();
            });

            // --- UI and Flicker Logic ---
            document.getElementById('toggle-conn-btn').addEventListener('click', () => {
                showConnections = !showConnections;
                const btn = document.getElementById('toggle-conn-btn');
                btn.textContent = showConnections ? 'Nascondi Connessioni' : 'Mostra Connessioni';
                btn.classList.toggle('active', showConnections);
                draw();
            });

            document.getElementById('reset-view-btn').addEventListener('click', () => {
                pan_offset = { x: 0, y: 0 };
                scale = 1.0;
                draw();
            });
            
            const flickerOverlay = document.getElementById('flicker-overlay');
            setInterval(() => {
                if (Math.random() > 0.8) {
                    flickerOverlay.style.opacity = '0.7';
                    setTimeout(() => { flickerOverlay.style.opacity = '0'; }, 60);
                }
            }, 15000);
        }
        
        loadIcons();
    });
    </script>

</body>
</html>
