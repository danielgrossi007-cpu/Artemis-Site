<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>Artemis - Super Mario Classic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-color: #050810; 
            --accent-color: #00f2ff; 
            --secondary-color: #ff0055;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color);
            color: #e0e0e0; font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; overflow: hidden;
        }

        /* --- HEADER ARTEMIS --- */
        .header { 
            display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 20px; z-index: 100; 
        }

        .game-title { 
            font-size: 2.8rem; font-weight: 900; color: var(--accent-color); 
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); margin: 0; 
            text-transform: uppercase; letter-spacing: 2px;
        }

        .back-link { 
            color: #fff; text-decoration: none; font-weight: 700; 
            background: rgba(255, 0, 85, 0.2); border: 1px solid var(--secondary-color); 
            padding: 6px 30px; border-radius: 30px; font-size: 0.8rem; 
            transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }
        .back-link:hover { background: var(--secondary-color); box-shadow: 0 0 20px var(--secondary-color); }

        /* --- CONTENITORE GIOCO CON ZOOM --- */
        #game-wrapper-container {
            width: 640px; height: 480px; display: flex;
            justify-content: center; align-items: center;
            margin: 60px 0; 
        }

        #game-wrapper {
            position: relative; width: 640px; height: 480px; background: #000;
            border: 3px solid var(--accent-color); border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.2); overflow: hidden;
            /* Lo zoom 1.5x o 2x a seconda della preferenza */
            transform: scale(1.5); transform-origin: center center;
            display: flex; justify-content: center; align-items: center;
        }

        /* STILE TASTO PLAY INTERNO */
        #startButton {
            display: block; padding: 15px 40px;
            background-color: transparent; color: var(--accent-color);
            border: 2px solid var(--accent-color); border-radius: 50px;
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            transition: 0.3s; z-index: 10;
        }
        #startButton:hover {
            background-color: var(--accent-color); color: #000;
            box-shadow: 0 0 30px var(--accent-color);
        }

        #game { width: 100%; height: 100%; }

        .controls-hint {
            margin-top: 40px; font-size: 0.8rem; opacity: 0.5; text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1 class="game-title">SUPER MARIO</h1>
        <a href="giochi.html" class="back-link"><i class="fa-solid fa-power-off"></i> ESCI</a>
    </div>

    <div id="game-wrapper-container">
        <div id="game-wrapper">
            <div id="game"></div>
            <button id="startButton">PLAY</button>
        </div>
    </div>

    <div class="controls-hint">
        Usa i tasti a schermo o la tastiera per giocare
    </div>

    <script>
        function startGame() {
            document.getElementById("game").style.display = "block";
            document.getElementById("startButton").style.display = "none";
            
            // Configurazione EmulatorJS
            EJS_player = "#game";
            EJS_core = "nes";
            EJS_color = "#00f2ff"; // Colore tema Artemis
            EJS_startOnLoaded = true;
            EJS_pathtodata = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data";
            EJS_gameUrl = "https://cdn.jsdelivr.net/gh/bubbls/UGS-file-encryption@e0c78a58432c6486ebe1a50a78d263df65809a83/Super%20Mario%20Bros.%20(Europe).zip";
            
            loadEmulator();  
        }

        document.getElementById("startButton").addEventListener("click", startGame);

        function loadEmulator() {
            // Carica il loader dell'emulatore
            var script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/gh/a456pur/seraph@81f551ca0aa8e3d6018d32d8ac5904ac9bc78f76/storage/emulatorjs/data/loader.js";
            document.body.appendChild(script);

            // Carica script di occultamento (se necessario)
            var cloakScript = document.createElement("script");
            cloakScript.src = "https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/storage/js/cloak.js";
            document.body.appendChild(cloakScript);
        }
    </script>
</body>
</html>
