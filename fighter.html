<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis Cyber Fighter</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --page-bg: #030712;
            --accent: #3A82F6;
            --accent-glow: rgba(58, 130, 246, 0.4);
            --danger: #F43F5E;
            --danger-glow: rgba(244, 63, 94, 0.4);
            --success: #10B981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --text-primary: #F8FAFC;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--page-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at top, rgba(58, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at bottom, rgba(244, 63, 94, 0.1) 0%, transparent 60%);
            overflow: hidden;
            user-select: none;
        }

        .game-header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 20px;
            z-index: 10;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-radius: 999px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(12px);
        }

        .btn-back:hover {
            background: rgba(30, 41, 59, 0.9);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateX(-4px);
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .controls-hint {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: #94A3B8;
            font-weight: 600;
            background: rgba(15, 23, 42, 0.5);
            padding: 10px 20px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
            color: white;
            box-shadow: 0 2px 0 rgba(0,0,0,0.5);
            margin: 0 2px;
        }

        .arena {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.8), 
                0 0 0 1px rgba(255,255,255,0.05),
                0 0 40px var(--accent-glow);
        }

        canvas {
            display: block;
            width: 1024px;
            height: 576px;
            background: #020617; /* Sfondo nero base */
        }

        .hud {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 30px 40px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        .profile-container {
            display: flex;
            flex-direction: column;
            width: 380px;
        }

        .p1-profile { align-items: flex-start; }
        .p2-profile { align-items: flex-end; }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .p2-profile .player-info {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #111;
            border: 2px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        
        .p1-profile .avatar { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .p2-profile .avatar { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 15px var(--danger-glow); }

        .name-tag {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .health-bar-container {
            width: 100%;
            height: 24px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            position: relative;
            transform: skew(-15deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .health-bar-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
        }

        .health-bar-fill {
            height: 100%;
            transition: width 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .p1-profile .health-bar-fill {
            background: linear-gradient(90deg, #2563EB, #60A5FA);
            box-shadow: 0 0 15px var(--accent-glow);
            width: 100%;
        }

        .p2-profile .health-bar-fill {
            background: linear-gradient(-90deg, #E11D48, #FB7185);
            box-shadow: 0 0 15px var(--danger-glow);
            width: 100%;
            float: right;
        }

        /* Stamina / Special Bar P1 */
        .sp-bar-container {
            width: 60%;
            height: 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
            transform: skew(-15deg);
        }

        .sp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #8B5CF6, #C084FC);
            width: 100%;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
            transition: width 0.2s linear;
        }

        .timer-box {
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.4), 2px 4px 6px rgba(0,0,0,0.8);
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 24px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            margin-top: -10px;
        }

        #gameOverScreen {
            position: absolute;
            inset: 0;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
        }

        #gameOverScreen.active {
            opacity: 1;
            pointer-events: all;
        }

        .ko-text {
            font-size: 7rem;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 3px white;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255,255,255,0.5);
            transform: scale(0.8);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #gameOverScreen.active .ko-text {
            transform: scale(1);
        }

        .winner-text {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .winner-text.lose { color: var(--danger); }

        .btn-restart {
            padding: 16px 40px;
            background: white;
            color: #030712;
            border: none;
            border-radius: 999px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }

        .btn-restart:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 40px rgba(255,255,255,0.4);
        }

        /* Screen Shake Class */
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
    </style>
</head>

<body>
    <div class="game-header">
        <a href="giochi.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Torna ai Giochi</a>
        <div class="game-title"><i class="fa-solid fa-bolt"></i> Artemis Cyber Fighter</div>
        <div class="controls-hint">
            <span>Frecce <span class="key">←</span> <span class="key">↑</span> <span class="key">→</span></span>
            <span>Mosse <span class="key">W</span> <span class="key">E</span> <span class="key">R</span> <span class="key">T</span></span>
        </div>
    </div>

    <div class="arena" id="arenaBox">
        <canvas id="gameCanvas" width="1024" height="576"></canvas>
        <div class="hud">
            <!-- Player 1 Profile -->
            <div class="profile-container p1-profile">
                <div class="player-info">
                    <div class="avatar">P1</div>
                    <div class="name-tag">Player 1</div>
                </div>
                <div class="health-bar-container">
                    <div class="health-bar-fill" id="p1-health"></div>
                </div>
                <div class="sp-bar-container">
                    <div class="sp-bar-fill" id="p1-sp"></div>
                </div>
            </div>

            <!-- Timer -->
            <div class="timer-box" id="timer">60</div>

            <!-- Player 2 Profile -->
            <div class="profile-container p2-profile">
                <div class="player-info">
                    <div class="avatar">AI</div>
                    <div class="name-tag">Artemis Core</div>
                </div>
                <div class="health-bar-container">
                    <div class="health-bar-fill" id="p2-health"></div>
                </div>
            </div>
        </div>

        <!-- KO Screen -->
        <div id="gameOverScreen">
            <div class="ko-text">K.O.</div>
            <div class="winner-text" id="winnerText">Player 1 Wins</div>
            <button class="btn-restart" onclick="restartGame()">Combatti Ancora</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const arenaBox = document.getElementById('arenaBox');

        // Impostazioni Fisiche
        const gravity = 0.85;
        const groundLevel = canvas.height - 70;
        
        // UI Elements
        const p1HealthBar = document.getElementById('p1-health');
        const p2HealthBar = document.getElementById('p2-health');
        const p1SpBar = document.getElementById('p1-sp');
        const timerEl = document.getElementById('timer');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const winnerText = document.getElementById('winnerText');

        // Stati Gioco
        let timer = 60;
        let timerId;
        let isGameOver = false;

        const keys = {
            ArrowLeft: { pressed: false },
            ArrowRight: { pressed: false },
            ArrowUp: { pressed: false }
        };

        // --- CLASSE CYBER FIGHTER ---
        class CyberFighter {
            constructor({ x, y, isEnemy = false }) {
                this.position = { x, y };
                this.velocity = { x: 0, y: 0 };
                // L'hitbox reale (tronco/gambe)
                this.width = 60;
                this.height = 140; 
                this.isEnemy = isEnemy;
                this.health = 100;
                this.sp = 100; // Special bar
                
                // Colorazioni Cyber
                this.color = isEnemy ? '#F43F5E' : '#3A82F6';
                this.glow = isEnemy ? 'rgba(244, 63, 94, 0.6)' : 'rgba(58, 130, 246, 0.6)';

                this.facingRight = !isEnemy;
                this.dead = false;

                // Animazioni e Combattimento
                this.isAttacking = false;
                this.attackType = null;
                this.attackFrames = 0;
                this.attackMaxFrames = 0;
                this.damageDealt = false; // per colpire solo 1 volta per attacco

                // Variabili animazioni decorative
                this.breathe = 0;
                this.hitStun = 0;
                this.actionState = 'idle'; // idle, run, jump, attack
                
                // Attack Hitbox info
                this.attackBox = { x: 0, y: 0, w: 0, h: 0 };
            }

            drawRobot() {
                ctx.save();
                
                // Effetto Hit Stun (Trema e lampeggia bianco)
                if (this.hitStun > 0) {
                    ctx.translate(Math.random() * 6 - 3, Math.random() * 6 - 3);
                    ctx.globalCompositeOperation = "lighter";
                }

                const px = this.position.x;
                const py = this.position.y;
                const dir = this.facingRight ? 1 : -1;

                // Breathing animation
                this.breathe += 0.05;
                const bOffset = Math.sin(this.breathe) * 3;

                // Glow globale del player
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.hitStun > 0 ? 'white' : this.glow;

                // --- Gambe (Semplici linee robotiche) ---
                ctx.lineWidth = 12;
                ctx.strokeStyle = '#1E293B';
                if(this.actionState === 'run') {
                    // Animazione corsa rozza
                    const runOffset = Math.sin(this.breathe * 4) * 20;
                    // L
                    ctx.beginPath(); ctx.moveTo(px + 30, py + 80); ctx.lineTo(px + 30 + runOffset, py + 140); ctx.stroke();
                    // R
                    ctx.beginPath(); ctx.moveTo(px + 30, py + 80); ctx.lineTo(px + 30 - runOffset, py + 140); ctx.stroke();
                } else {
                    // Idle (Gambe ferme divaricate)
                    ctx.beginPath(); ctx.moveTo(px + 30, py + 80); ctx.lineTo(px + 15, py + 140); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(px + 30, py + 80); ctx.lineTo(px + 45, py + 140); ctx.stroke();
                }

                // --- Torso (Armatura core) ---
                ctx.fillStyle = '#0F172A';
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                
                // Inclina il torso durante la corsa o attacco
                let torsoTilt = 0;
                if(this.actionState === 'run') torsoTilt = 10 * dir;
                
                ctx.translate(px + 30, py + 50 + bOffset);
                ctx.rotate(torsoTilt * Math.PI / 180);
                
                // Disegna Torso
                ctx.beginPath();
                ctx.moveTo(-20, -30);
                ctx.lineTo(20, -30);
                ctx.lineTo(15, 30);
                ctx.lineTo(-15, 30);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Core centrale luminoso
                ctx.fillStyle = this.hitStun > 0 ? 'white' : this.color;
                ctx.shadowBlur = 15;
                ctx.beginPath(); ctx.arc(0, -5, 8, 0, Math.PI * 2); ctx.fill();

                ctx.rotate(-torsoTilt * Math.PI / 180);
                ctx.translate(-(px + 30), -(py + 50 + bOffset));

                // --- Testa ---
                ctx.fillStyle = '#1E293B';
                ctx.beginPath();
                ctx.arc(px + 30, py + 15 + bOffset, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                // Visore Occhio
                ctx.fillStyle = this.hitStun > 0 ? 'white' : '#fff';
                ctx.fillRect(px + 30 + (dir * 8) - 4, py + 12 + bOffset, 8, 4);

                // --- Braccia / Attacchi ---
                ctx.lineWidth = 10;
                // Braccio Dietro
                ctx.strokeStyle = '#0F172A';
                ctx.beginPath(); ctx.moveTo(px+30, py+30+bOffset); ctx.lineTo(px+30-(dir*15), py+60+bOffset); ctx.stroke();
                
                // Braccio Avanti / Attacco
                let armX = px+30;
                let armY = py+30+bOffset;
                
                if (this.isAttacking) {
                    ctx.strokeStyle = this.color;
                    ctx.shadowBlur = 30;
                    
                    if (this.attackType === 'W') { // Jab rapido
                        let ext = Math.sin((this.attackFrames / this.attackMaxFrames) * Math.PI) * 70;
                        ctx.beginPath(); ctx.moveTo(armX, armY); ctx.lineTo(armX + (dir * ext), armY); ctx.stroke();
                        // Calcola Hitbox
                        this.attackBox = { x: this.facingRight ? armX : armX - ext, y: armY - 15, w: ext, h: 30 };
                    
                    } else if (this.attackType === 'E') { // Uppercut / Smash
                        let extX = Math.sin((this.attackFrames / this.attackMaxFrames) * Math.PI) * 50;
                        let extY = Math.sin((this.attackFrames / this.attackMaxFrames) * Math.PI) * -80;
                        ctx.beginPath(); ctx.moveTo(armX, armY); ctx.lineTo(armX + (dir*extX), armY + extY); ctx.stroke();
                        this.attackBox = { x: this.facingRight ? armX : armX - 50, y: armY - 80, w: 50, h: 80 };
                    
                    } else if (this.attackType === 'R') { // Calcio (Sovrascrive la logica braccio visivamente, ma usiamo l'hitbox)
                        let ext = Math.sin((this.attackFrames / this.attackMaxFrames) * Math.PI) * 80;
                        ctx.strokeStyle = this.color;
                        ctx.beginPath(); ctx.moveTo(px+30, py+100); ctx.lineTo(px+30 + (dir*ext), py+100); ctx.stroke();
                        this.attackBox = { x: this.facingRight ? px+30 : px+30 - ext, y: py+85, w: ext, h: 30 };
                    
                    } else if (this.attackType === 'T') { // Special Beam
                        let ext = (this.attackMaxFrames - this.attackFrames) * 12; // Raggio che si allunga velocemente
                        if(ext > 400) ext = 400; // Cap
                        // Aura accumulo
                        ctx.fillStyle = 'rgba(255,255,255,0.8)';
                        ctx.beginPath(); ctx.arc(armX + (dir*20), armY, 15 + Math.random()*10, 0, Math.PI*2); ctx.fill();
                        
                        // Beam
                        ctx.fillStyle = this.color;
                        let bH = 40 + Math.random()*10;
                        let bX = this.facingRight ? armX + 20 : armX - 20 - ext;
                        ctx.fillRect(bX, armY - bH/2, ext, bH);
                        
                        this.attackBox = { x: bX, y: armY - bH/2, w: ext, h: bH };
                    }
                } else {
                    // Reposo Braccio Avanti
                    ctx.strokeStyle = this.color;
                    ctx.shadowBlur = 0;
                    ctx.beginPath(); ctx.moveTo(armX, armY); ctx.lineTo(armX+(dir*20), armY+30); ctx.stroke();
                }

                ctx.restore();
            }

            update() {
                this.drawRobot();
                
                if (this.dead) {
                    this.actionState = 'dead';
                    // Animazione morte: cade a terra gradualmente
                    if (this.height > 20) {
                        this.height -= 10;
                        this.position.y += 10;
                    }
                    return;
                }

                // Hitstun timer
                if(this.hitStun > 0) this.hitStun--;

                // Gestione Attacco Frames
                if (this.isAttacking) {
                    this.attackFrames--;
                    if (this.attackFrames <= 0) {
                        this.isAttacking = false;
                        this.damageDealt = false;
                    }
                }

                // SP Recovery (Player 1 only per semplicità o entrambi)
                if(!this.isEnemy && this.sp < 100) this.sp += 0.1;

                // Fisica
                this.position.y += this.velocity.y;
                this.position.x += this.velocity.x;

                // Gravità e Pavimento
                if (this.position.y + this.height + this.velocity.y >= groundLevel) {
                    this.velocity.y = 0;
                    this.position.y = groundLevel - this.height;
                } else {
                    this.velocity.y += gravity;
                }

                // Limiti Arena (Bordi invisibili per non uscire dallo schermo)
                if (this.position.x < 20) this.position.x = 20;
                if (this.position.x + this.width > canvas.width - 20) this.position.x = canvas.width - 20 - this.width;

                // Aggiornamento State per animazione
                if (!this.isAttacking && this.hitStun === 0) {
                    if (this.position.y < groundLevel - this.height) {
                        this.actionState = 'jump';
                    } else if (this.velocity.x !== 0) {
                        this.actionState = 'run';
                    } else {
                        this.actionState = 'idle';
                    }
                }
            }

            attack(type = 'W') {
                // Non si attacca se si sta già attaccando o se in hitstun
                if (this.isAttacking || this.hitStun > 0 || this.dead) return;

                if (type === 'T') {
                    if (this.sp < 100) return; // Non abbastanza energia speciale
                    this.sp = 0; // Azzera
                }

                this.isAttacking = true;
                this.attackType = type;
                this.damageDealt = false;
                
                if (type === 'W') this.attackMaxFrames = 15;
                if (type === 'E') this.attackMaxFrames = 25;
                if (type === 'R') this.attackMaxFrames = 20;
                if (type === 'T') this.attackMaxFrames = 35; // Lungo per il laser
                
                this.attackFrames = this.attackMaxFrames;
                this.actionState = 'attack';
            }

            takeDamage(amount) {
                if(this.dead) return;
                this.health -= amount;
                this.hitStun = 15; // Ferma animazioni per 15 frame
                this.velocity.x = this.facingRight ? -4 : 4; // Piccolo sbalzo all'indietro
                
                if (this.health <= 0) {
                    this.health = 0;
                    this.dead = true;
                }
            }
        }

        // Istanzia combattenti
        const p1 = new CyberFighter({ x: 200, y: 100 });
        const ai = new CyberFighter({ x: 750, y: 100, isEnemy: true });

        // Input Listener
        window.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            switch (e.key) {
                case 'ArrowLeft': keys.ArrowLeft.pressed = true; break;
                case 'ArrowRight': keys.ArrowRight.pressed = true; break;
                case 'ArrowUp': 
                    if (p1.velocity.y === 0) p1.velocity.y = -18; 
                    break;
                case 'w': case 'W': p1.attack('W'); break;
                case 'e': case 'E': p1.attack('E'); break;
                case 'r': case 'R': p1.attack('R'); break;
                case 't': case 'T': p1.attack('T'); break;
            }
        });

        window.addEventListener('keyup', (e) => {
            switch (e.key) {
                case 'ArrowLeft': keys.ArrowLeft.pressed = false; break;
                case 'ArrowRight': keys.ArrowRight.pressed = false; break;
            }
        });

        // Controlli Collisione Attacco Hitbox vs Hurtbox
        function rectIntersect(r1, r2) {
            return !(r2.x > r1.x + r1.w || 
                     r2.x + r2.w < r1.x || 
                     r2.y > r1.y + r1.h ||
                     r2.y + r2.h < r1.y);
        }

        function checkHit(attacker, defender) {
            if (attacker.isAttacking && !attacker.damageDealt) {
                // Durante l'animazione, il momento effettivo del danno è circa a metà animazione
                // Per rendere responsivo, lo controlliamo dalla seconda metà
                if (attacker.attackFrames < attacker.attackMaxFrames - 5) {
                    
                    const hurtBox = { x: defender.position.x, y: defender.position.y, w: defender.width, h: defender.height };
                    
                    if (rectIntersect(attacker.attackBox, hurtBox)) {
                        attacker.damageDealt = true; // Colpisce una volta
                        
                        // Danni
                        let dmg = 0;
                        if(attacker.attackType === 'W') dmg = 4;
                        if(attacker.attackType === 'E') dmg = 10;
                        if(attacker.attackType === 'R') dmg = 7;
                        if(attacker.attackType === 'T') dmg = 25; // Special fa malissimo

                        defender.takeDamage(dmg);
                        
                        // Screen shake al colpo
                        arenaBox.classList.remove('shake');
                        void arenaBox.offsetWidth; // trigger reflow
                        arenaBox.classList.add('shake');

                        updateUI();
                        if(defender.dead) endGame();
                    }
                }
            }
        }

        function updateUI() {
            p1HealthBar.style.width = p1.health + '%';
            p2HealthBar.style.width = ai.health + '%';
            p1SpBar.style.width = p1.sp + '%';
        }

        // ---------------- AI AVANZATA ----------------
        // Stati AI: 'wait', 'approach', 'retreat', 'attack'
        let aiState = 'wait';
        let aiTimer = 0;

        function updateAI() {
            if (ai.dead || isGameOver) {
                ai.velocity.x = 0;
                return;
            }

            // Hitstun cancella decisioni
            if(ai.hitStun > 0) return;

            const dist = (p1.position.x + p1.width/2) - (ai.position.x + ai.width/2);
            const absDist = Math.abs(dist);
            
            // Guarda sempre il player
            ai.facingRight = dist > 0;
            const dir = ai.facingRight ? 1 : -1;

            aiTimer--;

            // Transizioni di stato basate sulla distanza e sul timer
            if (aiTimer <= 0) {
                if (absDist > 250) {
                    aiState = 'approach';
                    aiTimer = 30 + Math.random() * 40;
                } else if (absDist < 80) {
                    // Troppo vicino, scelta: attacca o indietreggia
                    if (Math.random() < 0.6) {
                        aiState = 'attack';
                        aiTimer = 10;
                    } else {
                        aiState = 'retreat';
                        aiTimer = 15 + Math.random() * 20;
                    }
                } else {
                    // Mid-range: aspetta (finta furbizia) o avvicinati o salta
                    const rand = Math.random();
                    if(rand < 0.4) {
                        aiState = 'wait';
                        aiTimer = 20 + Math.random() * 30;
                    } else if (rand < 0.7) {
                        aiState = 'approach';
                        aiTimer = 20;
                    } else {
                        // Salta per approcciare
                        if(ai.velocity.y === 0) ai.velocity.y = -15;
                        aiState = 'approach';
                        aiTimer = 30;
                    }
                }
            }

            // Mantenimento logica in base allo stato
            switch(aiState) {
                case 'wait':
                    // Ferma o impercettibili spostamenti
                    ai.velocity.x = 0;
                    break;
                case 'approach':
                    ai.velocity.x = 4 * dir;
                    // Se si avvicina abbastanza durante l'approach, attacca subito
                    if (absDist < 100 && Math.random() < 0.1) {
                        aiState = 'attack';
                        aiTimer = 0;
                    }
                    break;
                case 'retreat':
                    ai.velocity.x = -3 * dir; // Vai indietro
                    break;
                case 'attack':
                    ai.velocity.x = 0;
                    if(!ai.isAttacking) {
                        // Scegli attacco in base a distanza e probabilita
                        let atk = 'W';
                        if (absDist > 100) atk = 'T'; // Se un po' lontano e vuole attaccare, tenta il raggio (se implementato) ma l'AI qui fa laser finto O semplicemente non attacca
                        else {
                            const r = Math.random();
                            if(r < 0.5) atk = 'W';
                            else if(r < 0.8) atk = 'E';
                            else atk = 'R';
                        }
                        ai.attack(atk);
                    }
                    aiState = 'wait';
                    aiTimer = ai.attackMaxFrames + 10; // aspetta un attimo dopo aver attaccato
                    break;
            }

            // Se chiuso in un angolo, deve assolutamente avvicinarsi saltando o attaccando
            if ((ai.position.x <= 30 || ai.position.x >= canvas.width - 90) && absDist > 150) {
                if(ai.velocity.y === 0 && Math.random() < 0.05) ai.velocity.y = -18; // Salto lungo
                aiState = 'approach';
            }
        }

        // ---------------- SISTEMA GIOCO ----------------
        function decreaseTimer() {
            if (timer > 0 && !isGameOver) {
                timerId = setTimeout(decreaseTimer, 1000);
                timer--;
                timerEl.textContent = timer;
                if (timer <= 15) timerEl.style.color = 'var(--danger)';
            }
            if (timer === 0) endGame();
        }

        function endGame() {
            clearTimeout(timerId);
            isGameOver = true;
            gameOverScreen.classList.add('active');
            
            if (p1.health === ai.health) {
                winnerText.textContent = "PAREGGIO!";
                winnerText.style.color = "white";
            } else if (p1.health > ai.health) {
                winnerText.textContent = "PLAYER 1 WINS!";
                winnerText.classList.remove('lose');
            } else {
                winnerText.textContent = "SYSTEM DEFEATED";
                winnerText.classList.add('lose');
            }
        }

        function restartGame() {
            isGameOver = false;
            gameOverScreen.classList.remove('active');
            
            p1.health = 100; p1.sp = 100; p1.dead = false; p1.position = { x: 200, y: 100 };
            ai.health = 100; ai.dead = false; ai.position = { x: 750, y: 100 };
            
            timer = 60;
            timerEl.textContent = timer;
            timerEl.style.color = 'white';
            
            aiState = 'wait';
            aiTimer = 60;

            updateUI();
            clearTimeout(timerId);
            decreaseTimer();
        }

        // ---- Disegno Sfondo Cyberpunk ----
        function drawBackground() {
            // Gradient Sky
            let bgGrad = ctx.createLinearGradient(0,0,0, canvas.height);
            bgGrad.addColorStop(0, '#020617');
            bgGrad.addColorStop(1, '#0F172A');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0,0, canvas.width, canvas.height);

            // Griglia di sfondo (stile synthwave ma scura)
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.05)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=80) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, groundLevel); ctx.stroke();
            }
            for(let i=0; i<groundLevel; i+=80) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Silhouette palazzi lontani
            ctx.fillStyle = '#090D18';
            ctx.fillRect(50, 200, 150, 400);
            ctx.fillRect(250, 150, 200, 450);
            ctx.fillRect(600, 250, 180, 400);
            ctx.fillRect(850, 100, 150, 500);

            // Luci neon palazzi
            ctx.fillStyle = 'rgba(236, 72, 153, 0.3)'; // Rosa neon
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#EC4899';
            for(let y=180; y<groundLevel; y+=40) {
                ctx.fillRect(300, y, 10, 20);
                ctx.fillRect(330, y, 10, 20);
                ctx.fillRect(360, y, 10, 20);
            }
            
            ctx.fillStyle = 'rgba(56, 189, 248, 0.3)'; // Azzurro neon
            ctx.shadowColor = '#38BDF8';
            for(let y=130; y<groundLevel; y+=50) {
                ctx.fillRect(900, y, 20, 10);
                ctx.fillRect(940, y, 20, 10);
            }
            ctx.shadowBlur = 0;

            // Pavimento / Ring
            ctx.fillStyle = '#1E293B';
            ctx.fillRect(0, groundLevel, canvas.width, canvas.height - groundLevel);
            // Bordo neon alto terreno
            ctx.fillStyle = '#38BDF8';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#38BDF8';
            ctx.fillRect(0, groundLevel-2, canvas.width, 4);
            ctx.beginPath();
            ctx.moveTo(0, groundLevel-2);
            ctx.lineTo(canvas.width, groundLevel-2);
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Loop di Gioco Principale
        function animate() {
            window.requestAnimationFrame(animate);
            drawBackground();

            // P1 Input
            if(!p1.hitStun && !p1.dead) {
                p1.velocity.x = 0;
                if (keys.ArrowLeft.pressed) { p1.velocity.x = -5.5; p1.facingRight = false; }
                else if (keys.ArrowRight.pressed) { p1.velocity.x = 5.5; p1.facingRight = true; }
            }

            // Aggiorna Entità
            p1.update();
            updateAI();
            ai.update();

            // Controlla collisioni attacchi
            checkHit(p1, ai);
            checkHit(ai, p1);
        }

        decreaseTimer();
        animate();
    </script>
</body>
